<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vôlei Draft PRO 3.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* ... Manter estilos anteriores e adicionar ... */
    .arena-status { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #ffa000; font-size: 14px; }
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
    .fire { background: #ff4500; color: white; }
    .ice { background: #00ffff; color: #000; }
    .radar-container { width: 100%; max-width: 200px; margin: 0 auto; height: 150px; }
    .zebra-box { font-size: 11px; font-weight: bold; padding: 4px; border-radius: 4px; display: inline-block; margin-top: 5px;}
  </style>
</head>
<body>

  <script> const API_URL = "https://script.google.com/macros/s/AKfycbxjdeRnBBrjMu79AhRF6yTLttHKmIa9NPOASYYqyiM4y0CT7AGgdhesbfKau6VEipHJ/exec"; </script>

  <script>
    let sys = { players: [], roster: [], checkins: [], history: [], matches: [], absences: [], currentTeams: [] };
    let reiDaQuadra = { emQuadra: [], fila: [0, 1, 2, 3], vitoriasSeguidas: 0 };

    // --- NOMES DE TIMES AUTOMÁTICOS ---
    function gerarNomeTime(jogadores) {
      const prefixos = ["Os Galácticos de", "Sada Cruzeiro de", "Vôlei Mania de", "Muralha de", "Vingadores de", "Elite de"];
      let randomPlayer = jogadores[Math.floor(Math.random() * jogadores.length)].nome.split(' ')[0];
      return `${prefixos[Math.floor(Math.random() * prefixos.length)]} ${randomPlayer}`;
    }

    // --- LÓGICA REI DA QUADRA (QUEM GANHA 2X SENTA) ---
    function registrarVitoria(lado) {
      if(sys.currentTeams.length < 2) return;
      
      let tA_idx = reiDaQuadra.emQuadra[0];
      let tB_idx = reiDaQuadra.emQuadra[1];
      let vencedor_idx = lado === 'A' ? tA_idx : tB_idx;
      let perdedor_idx = lado === 'A' ? tB_idx : tA_idx;

      // Tracking de vitórias seguidas
      if (reiDaQuadra.vencedorAnterior === vencedor_idx) reiDaQuadra.vitoriasSeguidas++;
      else reiDaQuadra.vitoriasSeguidas = 1;

      reiDaQuadra.vencedorAnterior = vencedor_idx;

      // A REGRA: Ganhou 2x? Senta.
      if (reiDaQuadra.vitoriasSeguidas >= 2) {
        showTst("Limite de 2 vitórias! Time vencedor descansando.");
        reiDaQuadra.fila.push(vencedor_idx);
        reiDaQuadra.fila.push(perdedor_idx);
        reiDaQuadra.vitoriasSeguidas = 0;
        reiDaQuadra.vencedorAnterior = null;
      } else {
        reiDaQuadra.fila.push(perdedor_idx);
      }

      // Próxima partida
      atualizarFilaArena();
      renderizarArena();
      
      // Salva no backend com detecção de Zebra e MMR
      let dadosVencedor = sys.currentTeams[vencedor_idx];
      fetchActionAsync('saveMatch', {
        vencedor: "Time " + (vencedor_idx + 1),
        perdedor: "Time " + (perdedor_idx + 1),
        jogadoresVencedores: dadosVencedor.map(j => j.nome)
      });
    }

    function atualizarFilaArena() {
      reiDaQuadra.emQuadra = [reiDaQuadra.fila.shift(), reiDaQuadra.fila.shift()];
    }

    // --- CÁLCULO DE MMR E TÍTULOS ---
    function obterStats(nome) {
      let jogos = sys.history.filter(r => [r[3],r[4],r[5],r[6],r[7],r[8]].includes(nome));
      let vits = sys.matches.filter(m => {
        let draft = sys.history.find(h => h[1] === m[0] && h[0] === m[1]);
        return draft && [draft[3],draft[4],draft[5],draft[6],draft[7],draft[8]].includes(nome);
      });
      return { winRate: jogos.length > 0 ? vits.length / jogos.length : 0.5, total: jogos.length, wins: vits.length };
    }

    // --- RENDERIZAR ARENA COM SPIDER CHART ---
    function renderizarArena() {
      if (reiDaQuadra.emQuadra.length === 0) atualizarFilaArena();
      
      let c = document.getElementById('resultado-container'); c.innerHTML='';
      document.getElementById('arena-view').style.display = 'block';

      reiDaQuadra.emQuadra.forEach((tIdx, side) => {
        let time = sys.currentTeams[tIdx];
        let card = document.createElement('div'); card.className = 'time-card';
        if(side === 0) card.style.borderLeft = "6px solid #2196F3";
        
        let stats = calcTimeStats(time);
        let nomeTime = gerarNomeTime(time);

        card.innerHTML = `
          <div class="time-title">${nomeTime} <span>⭐ ${stats.estrelas}</span></div>
          <div class="radar-container"><canvas id="radar-${tIdx}"></canvas></div>
          <div class="zebra-box" style="background:${side===0?'#2196F3':'#f44336'}">FORÇA: ${stats.power}%</div>
          <div class="drop-zone">
            ${time.map(j => `
              <div class="player-card rank-${j.estrelas}">
                <span>${j.nome} ${renderBadges(j.nome)}</span>
                <span>⭐${j.estrelas}</span>
              </div>
            `).join('')}
          </div>
        `;
        c.appendChild(card);
        setTimeout(() => drawRadar(`radar-${tIdx}`, stats), 100);
      });
    }

    function renderBadges(nome) {
      // Simplificado: Busca vitórias seguidas no histórico local
      let badgeHtml = "";
      let stats = obterStats(nome);
      if(stats.winRate > 0.7 && stats.total > 5) badgeHtml += '<span class="badge fire">🔥 ON FIRE</span>';
      if(stats.winRate < 0.3 && stats.total > 5) badgeHtml += '<span class="badge ice">🧊 GELADEIRA</span>';
      return badgeHtml;
    }

    function calcTimeStats(time) {
      let somaEstrelas = time.reduce((a, b) => a + b.estrelas, 0);
      let mmrMedio = time.reduce((a, b) => a + obterStats(b.nome).winRate, 0) / time.length;
      return {
        estrelas: somaEstrelas,
        tecnico: (somaEstrelas / 24) * 100,
        ritmo: mmrMedio * 100,
        defesa: 70 + (Math.random() * 20), // Placeholder para lógica futura
        power: Math.round((somaEstrelas * 2) + (mmrMedio * 20))
      };
    }

    function drawRadar(id, stats) {
      new Chart(document.getElementById(id), {
        type: 'radar',
        data: {
          labels: ['Técnico', 'WinRate', 'Defesa'],
          datasets: [{
            data: [stats.tecnico, stats.ritmo, stats.defesa],
            backgroundColor: 'rgba(255, 107, 107, 0.2)',
            borderColor: '#ff6b6b',
            borderWidth: 1,
            pointRadius: 0
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#333' } } }
        }
      });
    }
  </script>
</body>
</html>
